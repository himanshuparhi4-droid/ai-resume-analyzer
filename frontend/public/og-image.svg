      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#eaf6fb"/>
      <stop offset="1" stop-color="#dff4fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
